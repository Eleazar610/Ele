<html>
<head>
<meta charset="UTF-8">
<title>Menú</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    height:100vh;
    color:white;
}
.panel{
    width:90%;
    margin:20px auto;
    padding:20px;
    border-radius:25px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:
    0 0 25px rgba(0,255,255,.2),
    inset 0 0 20px rgba(255,255,255,.03);
}
.titulo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#00eaff;
    margin-bottom:5px;
    text-shadow:
    0 0 10px #00eaff,
    0 0 20px #00eaff;
}
.subtitulo{
    text-align:center;
    color:#bbb;
    margin-bottom:25px;
    letter-spacing:2px;
}
.menu a{
    display:block;
    text-decoration:none;
    color:white;
    padding:18px;
    margin-bottom:15px;
    border-radius:18px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    transition:.35s;
    font-weight:bold;
}
.menu a:hover{
    transform:translateX(10px);
    background:linear-gradient(90deg,#00eaff,#008cff);
    box-shadow:0 0 20px #00eaff;
}
.linea{
    width:70%;
    height:2px;
    background:#00eaff;
    margin:15px auto 25px;
    box-shadow:0 0 10px #00eaff;
}
.footer{
    text-align:center;
    color:#888;
    margin-top:25px;
    font-size:12px;
}
</style>
</head>
<body>
<div class="panel">
<div class="titulo">
FORTNITE
</div>
<div class="subtitulo">
TOP SHOTGUNS
</div>
<div class="linea"></div>
<div class="menu">
<a href="Marco derecho.html" target="principal">
 Inicio
</a>
<a href="pump.html" target="principal">
 Escopeta Pump
</a>
<a href="tactica.html" target="principal">
 Escopeta Táctica
</a>
<a href="combate.html" target="principal">
 Escopeta de Combate
</a>
</div>
<div class="footer">
</div>
</div>
</body>
</html>
